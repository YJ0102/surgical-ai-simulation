<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Context-Aware Surgical AI Monitoring Simulation — Laparoscopic Cholecystectomy</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap');

:root {
  --bg-primary: #0a0e17;
  --bg-secondary: #111827;
  --bg-card: #1a2233;
  --bg-card-hover: #1f2937;
  --border: #2a3444;
  --border-active: #3b82f6;
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --accent-blue: #3b82f6;
  --accent-teal: #14b8a6;
  --accent-green: #22c55e;
  --accent-amber: #f59e0b;
  --accent-red: #ef4444;
  --accent-purple: #a78bfa;
  --glow-blue: rgba(59,130,246,0.15);
  --glow-teal: rgba(20,184,166,0.15);
  --glow-red: rgba(239,68,68,0.12);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'IBM Plex Sans', 'IBM Plex Sans KR', system-ui, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  overflow-x: hidden;
}

.mono { font-family: 'JetBrains Mono', monospace; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-secondary); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Animations */
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes glow { 0%, 100% { box-shadow: 0 0 8px var(--glow-blue); } 50% { box-shadow: 0 0 20px var(--glow-blue); } }
@keyframes scanline { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }

.animate-in { animation: fadeIn 0.4s ease-out; }
.animate-slide { animation: slideUp 0.5s ease-out; }
.animate-pulse { animation: pulse 2s ease-in-out infinite; }

/* Landing page */
.landing {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  background: radial-gradient(ellipse at 50% 30%, rgba(59,130,246,0.08) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 70%, rgba(20,184,166,0.05) 0%, transparent 50%),
              var(--bg-primary);
}

.landing h1 {
  font-size: 2rem;
  font-weight: 700;
  text-align: center;
  margin-bottom: 0.5rem;
  background: linear-gradient(135deg, var(--text-primary), var(--accent-blue));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.landing .subtitle {
  font-size: 0.95rem;
  color: var(--text-secondary);
  text-align: center;
  margin-bottom: 2.5rem;
  max-width: 600px;
  line-height: 1.6;
}

.condition-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1.25rem;
  max-width: 900px;
  width: 100%;
}

.condition-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.75rem;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.condition-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--accent-blue);
  opacity: 0;
  transition: opacity 0.3s;
}

.condition-card:hover {
  border-color: var(--border-active);
  transform: translateY(-4px);
  box-shadow: 0 8px 32px rgba(59,130,246,0.12);
}

.condition-card:hover::before { opacity: 1; }

.condition-card .tag {
  display: inline-block;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 0.25rem 0.6rem;
  border-radius: 4px;
  margin-bottom: 0.75rem;
}

.condition-card h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.5rem; }
.condition-card p { font-size: 0.82rem; color: var(--text-secondary); line-height: 1.55; }

.tag-a { background: rgba(100,116,139,0.2); color: #94a3b8; }
.tag-b { background: rgba(59,130,246,0.15); color: #60a5fa; }
.tag-c { background: rgba(20,184,166,0.15); color: #5eead4; }

/* Main simulation layout */
.sim-container {
  display: grid;
  grid-template-columns: 280px 1fr 320px;
  grid-template-rows: 56px 1fr;
  height: 100vh;
  gap: 0;
}

/* Top bar */
.topbar {
  grid-column: 1 / -1;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 1.25rem;
  gap: 1rem;
}

.topbar-brand {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.topbar-brand .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent-green);
  animation: pulse 2s infinite;
}

.topbar-info {
  display: flex;
  align-items: center;
  gap: 1.5rem;
  margin-left: auto;
  font-size: 0.78rem;
  color: var(--text-secondary);
}

.topbar-info .badge {
  padding: 0.2rem 0.6rem;
  border-radius: 4px;
  font-weight: 500;
  font-size: 0.72rem;
}

.badge-static { background: rgba(100,116,139,0.2); color: #94a3b8; }
.badge-phase { background: rgba(59,130,246,0.15); color: #60a5fa; }
.badge-full { background: rgba(20,184,166,0.15); color: #5eead4; }

/* Left panel */
.left-panel {
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  padding: 1rem;
  overflow-y: auto;
}

.panel-section { margin-bottom: 1.25rem; }
.panel-title {
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  margin-bottom: 0.6rem;
}

.phase-list { display: flex; flex-direction: column; gap: 0.35rem; }

.phase-item {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.5rem 0.6rem;
  border-radius: 8px;
  font-size: 0.8rem;
  color: var(--text-secondary);
  transition: all 0.3s;
  position: relative;
}

.phase-item.active {
  background: var(--glow-blue);
  color: var(--text-primary);
  border: 1px solid rgba(59,130,246,0.3);
}

.phase-item.completed { color: var(--text-muted); }
.phase-item.completed .phase-dot { background: var(--accent-green); }

.phase-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--border);
  flex-shrink: 0;
}

.phase-item.active .phase-dot {
  background: var(--accent-blue);
  box-shadow: 0 0 8px rgba(59,130,246,0.5);
}

.vital-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }

.vital-card {
  background: var(--bg-card);
  border-radius: 8px;
  padding: 0.6rem;
  text-align: center;
}

.vital-label { font-size: 0.65rem; color: var(--text-muted); margin-bottom: 0.2rem; }
.vital-value { font-size: 1.1rem; font-weight: 600; }
.vital-value.normal { color: var(--accent-green); }
.vital-value.warning { color: var(--accent-amber); }
.vital-value.danger { color: var(--accent-red); }

/* Center - surgical view */
.center-panel {
  background: var(--bg-primary);
  position: relative;
  display: flex;
  flex-direction: column;
}

.surgical-viewport {
  flex: 1;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0e17 100%);
}

.viewport-label {
  position: absolute;
  top: 0.75rem;
  left: 0.75rem;
  font-size: 0.7rem;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 0.4rem;
}

.viewport-label .rec {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent-red);
  animation: pulse 1.5s infinite;
}

/* SVG surgical animation area */
.surgical-svg {
  width: 100%;
  height: 100%;
}

/* Event overlay */
.event-overlay {
  position: absolute;
  bottom: 0;
  left: 0; right: 0;
  padding: 1.25rem;
  background: linear-gradient(to top, rgba(10,14,23,0.95) 0%, rgba(10,14,23,0.7) 70%, transparent 100%);
}

.event-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1rem 1.25rem;
  animation: slideUp 0.4s ease-out;
}

.event-card.critical { border-color: rgba(239,68,68,0.4); background: rgba(26,34,51,0.95); }
.event-card.warning { border-color: rgba(245,158,11,0.3); }

.event-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0.6rem;
}

.event-type {
  font-size: 0.68rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 0.15rem 0.5rem;
  border-radius: 4px;
}

.event-type.decision { background: rgba(59,130,246,0.15); color: #60a5fa; }
.event-type.alert { background: rgba(239,68,68,0.15); color: #f87171; }
.event-type.info { background: rgba(20,184,166,0.15); color: #5eead4; }

.event-timer { font-size: 0.78rem; color: var(--text-muted); }

.event-title { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.4rem; }
.event-desc { font-size: 0.82rem; color: var(--text-secondary); line-height: 1.5; margin-bottom: 0.8rem; }

.event-actions { display: flex; gap: 0.6rem; }

.btn {
  padding: 0.5rem 1.25rem;
  border-radius: 8px;
  font-size: 0.82rem;
  font-weight: 500;
  border: none;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}

.btn-approve {
  background: var(--accent-blue);
  color: white;
}
.btn-approve:hover { background: #2563eb; }

.btn-intervene {
  background: rgba(239,68,68,0.15);
  color: #f87171;
  border: 1px solid rgba(239,68,68,0.3);
}
.btn-intervene:hover { background: rgba(239,68,68,0.25); }

.btn-secondary {
  background: var(--bg-card-hover);
  color: var(--text-secondary);
  border: 1px solid var(--border);
}
.btn-secondary:hover { background: var(--border); color: var(--text-primary); }

/* Right panel */
.right-panel {
  background: var(--bg-secondary);
  border-left: 1px solid var(--border);
  padding: 1rem;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

/* AI status section (Condition C only) */
.ai-status-card {
  background: var(--bg-card);
  border-radius: 10px;
  padding: 1rem;
  border: 1px solid var(--border);
}

.confidence-bar-bg {
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
  margin-top: 0.5rem;
}

.confidence-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.8s ease, background 0.5s;
}

.ai-detail-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.35rem 0;
  font-size: 0.78rem;
}

.ai-detail-label { color: var(--text-muted); }
.ai-detail-value { color: var(--text-primary); font-weight: 500; }

/* Log section */
.log-entry {
  display: flex;
  gap: 0.6rem;
  padding: 0.5rem 0;
  border-bottom: 1px solid rgba(42,52,68,0.5);
  font-size: 0.78rem;
  animation: fadeIn 0.3s ease-out;
}

.log-time { color: var(--text-muted); font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; flex-shrink: 0; }
.log-text { color: var(--text-secondary); line-height: 1.4; }
.log-text.user-action { color: var(--accent-blue); }
.log-text.ai-action { color: var(--accent-teal); }
.log-text.alert-action { color: var(--accent-amber); }

/* Phase info (Condition B, C) */
.phase-info-card {
  background: var(--bg-card);
  border-radius: 10px;
  padding: 1rem;
  border: 1px solid var(--border);
}

.phase-info-title {
  font-size: 0.9rem;
  font-weight: 600;
  margin-bottom: 0.4rem;
}

.risk-indicator {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-top: 0.5rem;
}

.risk-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
}

.risk-low { background: var(--accent-green); }
.risk-medium { background: var(--accent-amber); }
.risk-high { background: var(--accent-red); }

.risk-label { font-size: 0.78rem; color: var(--text-secondary); }

/* Progress bar */
.progress-track {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin-top: 0.6rem;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: var(--accent-blue);
  border-radius: 2px;
  transition: width 1s ease;
}

/* Decision summary */
.decision-summary {
  background: var(--bg-card);
  border-radius: 10px;
  padding: 1rem;
  border: 1px solid var(--border);
}

.stat-row {
  display: flex;
  justify-content: space-between;
  padding: 0.35rem 0;
  font-size: 0.8rem;
}

.stat-label { color: var(--text-muted); }
.stat-value { font-weight: 600; }

/* Completion screen */
.completion-screen {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  background: radial-gradient(ellipse at 50% 40%, rgba(20,184,166,0.08) 0%, transparent 60%), var(--bg-primary);
}

.completion-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 2.5rem;
  max-width: 640px;
  width: 100%;
  text-align: center;
}

.completion-card h2 {
  font-size: 1.5rem;
  margin-bottom: 0.5rem;
}

.completion-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1rem;
  margin: 1.5rem 0;
}

.completion-stat {
  background: var(--bg-secondary);
  border-radius: 10px;
  padding: 1rem;
}

.completion-stat .num { font-size: 1.8rem; font-weight: 700; }
.completion-stat .label { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.25rem; }

/* Responsive */
@media (max-width: 1200px) {
  .sim-container { grid-template-columns: 240px 1fr 280px; }
}
@media (max-width: 900px) {
  .condition-grid { grid-template-columns: 1fr; max-width: 400px; }
  .sim-container { grid-template-columns: 1fr; grid-template-rows: 56px 1fr; }
  .left-panel, .right-panel { display: none; }
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// =====================
// DATA: Cholecystectomy Phases & Events
// =====================
// Cholec80 standard 7-phase definition (Twinanda et al., 2017)
// Median durations from Cholec80 dataset statistics
const PHASES = [
  { id: 'preparation', name: '수술 준비 (Preparation)', nameEn: 'P1: Preparation', risk: 'low', duration: 8, tools: ['Grasper', 'Hook'], cholec80Median: '3.2 min' },
  { id: 'dissection', name: 'Calot 삼각 박리 (Calot Triangle Dissection)', nameEn: 'P2: Calot Triangle Dissection', risk: 'high', duration: 35, tools: ['Grasper', 'Hook', 'Bipolar'], cholec80Median: '13.8 min' },
  { id: 'clipping', name: '결찰 및 절단 (Clipping & Cutting)', nameEn: 'P3: Clipping & Cutting', risk: 'high', duration: 15, tools: ['Clipper', 'Scissors'], cholec80Median: '2.4 min' },
  { id: 'separation', name: '담낭 박리 (Gallbladder Dissection)', nameEn: 'P4: Gallbladder Dissection', risk: 'medium', duration: 30, tools: ['Hook', 'Bipolar', 'Grasper'], cholec80Median: '9.8 min' },
  { id: 'extraction', name: '담낭 적출 (Gallbladder Retraction)', nameEn: 'P5: Gallbladder Retraction', risk: 'low', duration: 8, tools: ['Grasper', 'Specimen Bag'], cholec80Median: '1.8 min' },
];

const EVENTS_BY_PHASE = {
  preparation: [
    {
      id: 'e1',
      type: 'decision',
      title: 'AI 자동 기복(Pneumoperitoneum) 압력 설정',
      desc: 'AI가 환자 체형 데이터를 기반으로 CO₂ 주입 압력을 14mmHg로 설정했습니다. 승인하시겠습니까?',
      aiConfidence: 92,
      aiReasoning: '환자 BMI 24.3 기반 표준 프로토콜 적용',
      correctAction: 'approve',
      phaseContext: 'Cholec80 P1: Preparation — 기복 형성 및 트로카 삽입 단계, 표준 압력 범위 12-15mmHg'
    }
  ],
  dissection: [
    {
      id: 'e2',
      type: 'alert',
      title: '⚠ Critical View of Safety (CVS) 미확보 경고',
      desc: 'AI 시각 분석 결과 CVS가 아직 확보되지 않았습니다. Strasberg criteria 3개 중 1개만 충족. AI가 자동 박리를 계속할까요?',
      aiConfidence: 62,
      aiReasoning: 'Hepatocystic triangle 시야 확보 불완전 — Strasberg Score 1/3 (two-structure criterion 미충족)',
      correctAction: 'intervene',
      phaseContext: '⚠ Cholec80 P2: Calot Triangle Dissection — CVS 미확보 시 담관 손상 위험 (Cholec80-CVS 기준)'
    },
    {
      id: 'e3',
      type: 'decision',
      title: 'AI 조직 견인 방향 자동 조정',
      desc: 'AI가 Hartmann 낭 견인 각도를 측방 상방으로 15° 변경하여 시야를 개선하고자 합니다.',
      aiConfidence: 84,
      aiReasoning: '현재 견인 각도에서 담낭관 노출 부족, 15° 변경으로 시야 32% 개선 예측',
      correctAction: 'approve',
      phaseContext: 'Cholec80 P2: Calot 삼각 노출 최적화 — Grasper/Hook 동시 사용 구간'
    }
  ],
  clipping: [
    {
      id: 'e4',
      type: 'alert',
      title: '⚠ 담낭관(Cystic Duct) 구조 확인 필요',
      desc: 'AI가 담낭관으로 식별한 구조물에 대해 클리핑을 진행하려 합니다. 식별 신뢰도가 낮아 의사 확인이 필요합니다.',
      aiConfidence: 55,
      aiReasoning: '담관(CBD)과의 구분 불확실 — Clipper 적용 전 추가 확인 권장 (IOC 또는 ICG 형광)',
      correctAction: 'intervene',
      phaseContext: '⚠ Cholec80 P3: Clipping & Cutting — 잘못된 구조물 클리핑 시 담관 손상 위험 (Critical Phase)'
    }
  ],
  separation: [
    {
      id: 'e5',
      type: 'decision',
      title: 'AI 전기소작(Electrocautery) 출력 자동 조정',
      desc: 'AI가 간상(Liver Bed)으로부터의 담낭 분리를 위해 전기소작 출력을 30W에서 25W로 하향 조정합니다.',
      aiConfidence: 90,
      aiReasoning: '간 실질 근접 구간 감지 — 열 손상 최소화를 위한 출력 감소 (Hook → Bipolar 전환 권장)',
      correctAction: 'approve',
      phaseContext: 'Cholec80 P4: Gallbladder Dissection — 간상 근접 시 열손상 방지 출력 조정'
    }
  ],
  extraction: [
    {
      id: 'e6',
      type: 'decision',
      title: '배액관 삽입 생략 제안',
      desc: 'AI가 합병증 위험도를 분석하고 배액관(drain) 삽입 없이 종료할 것을 제안합니다.',
      aiConfidence: 86,
      aiReasoning: '수술 시간 45분 이내, 출혈 미감지, 합병증 위험도 Low — 배액관 생략이 표준',
      correctAction: 'approve',
      phaseContext: 'Cholec80 P5: Gallbladder Retraction — 비합병증 담낭절제술의 경우 배액관 생략 표준'
    }
  ]
};

// Vital signs simulation
function generateVitals(phase) {
  const base = {
    preparation: { hr: 72, bp: '120/78', spo2: 99, co2: 14 },
    dissection: { hr: 85, bp: '132/86', spo2: 97, co2: 15 },
    clipping: { hr: 88, bp: '135/88', spo2: 97, co2: 14 },
    separation: { hr: 82, bp: '130/84', spo2: 98, co2: 14 },
    extraction: { hr: 74, bp: '122/78', spo2: 99, co2: 13 },
  };
  const v = base[phase] || base.preparation;
  return {
    hr: v.hr + Math.floor(Math.random() * 6 - 3),
    bp: v.bp,
    spo2: v.spo2,
    co2: v.co2 + Math.floor(Math.random() * 2 - 1),
  };
}

// COMPONENTS

// Phase image mapping
const PHASE_IMAGES = {
  preparation: 'images/phase1.png',
  dissection: 'images/phase2.png',
  clipping: 'images/phase3.png',
  separation: 'images/phase4.png',
  extraction: 'images/phase5.png',
};

// Surgical View — real laparoscopic images per phase
function SurgicalView({ phase, phaseIndex }) {
  const [loaded, setLoaded] = React.useState({});
  const imgSrc = PHASE_IMAGES[phase] || PHASE_IMAGES.preparation;

  // Preload all images on mount
  React.useEffect(() => {
    Object.values(PHASE_IMAGES).forEach(src => {
      const img = new Image();
      img.onload = () => setLoaded(prev => ({...prev, [src]: true}));
      img.src = src;
    });
  }, []);

  return (
    <div style={{
      width: '100%',
      height: '100%',
      position: 'relative',
      display: 'flex',
      alignItems: 'center',
      justifyContent: 'center',
      background: '#050508',
    }}>
      {/* All phase images stacked, only current one visible */}
      {Object.entries(PHASE_IMAGES).map(([phaseId, src]) => (
        <img
          key={phaseId}
          src={src}
          alt={`Cholec80 Phase: ${phaseId}`}
          style={{
            position: 'absolute',
            top: '50%',
            left: '50%',
            transform: 'translate(-50%, -50%)',
            maxWidth: '100%',
            maxHeight: '100%',
            width: 'auto',
            height: '100%',
            objectFit: 'contain',
            opacity: phase === phaseId ? 1 : 0,
            transition: 'opacity 0.8s ease-in-out',
            borderRadius: '4px',
          }}
        />
      ))}

      {/* Phase label bar at bottom */}
      <div style={{
        position: 'absolute',
        bottom: 0,
        left: 0,
        right: 0,
        padding: '0.5rem 1rem',
        background: 'linear-gradient(to top, rgba(5,5,8,0.85) 0%, rgba(5,5,8,0.4) 70%, transparent 100%)',
        textAlign: 'center',
        fontFamily: "'JetBrains Mono', monospace",
        fontSize: '0.72rem',
        color: '#64748b',
        letterSpacing: '0.03em',
      }}>
        Phase {phaseIndex + 1}/5 — {PHASES[phaseIndex]?.nameEn}
      </div>
    </div>
  );
}


// Main App
function App() {
  const [screen, setScreen] = useState('landing'); // landing, simulation, complete
  const [condition, setCondition] = useState(null); // A, B, C
  const [currentPhaseIdx, setCurrentPhaseIdx] = useState(0);
  const [currentEventIdx, setCurrentEventIdx] = useState(0);
  const [activeEvent, setActiveEvent] = useState(null);
  const [decisions, setDecisions] = useState([]);
  const [logs, setLogs] = useState([]);
  const [vitals, setVitals] = useState({ hr: 72, bp: '120/78', spo2: 99, co2: 14 });
  const [elapsedTime, setElapsedTime] = useState(0);
  const [eventTimer, setEventTimer] = useState(0);
  const [waitingForEvent, setWaitingForEvent] = useState(false);
  const timerRef = useRef(null);
  const eventTimerRef = useRef(null);

  const currentPhase = PHASES[currentPhaseIdx];
  const phaseEvents = EVENTS_BY_PHASE[currentPhase?.id] || [];

  // Start simulation
  const startSimulation = (cond) => {
    setCondition(cond);
    setScreen('simulation');
    setCurrentPhaseIdx(0);
    setCurrentEventIdx(0);
    setDecisions([]);
    setLogs([]);
    setElapsedTime(0);
    addLog('시뮬레이션 시작 — 복강경 담낭절제술', 'system');
    addLog(`인터페이스 조건: ${cond === 'A' ? 'Static' : cond === 'B' ? 'Phase-Adaptive' : 'Phase + AI-State Adaptive'}`, 'system');
  };

  const addLog = useCallback((text, type = 'system') => {
    setLogs(prev => [...prev, { text, type, time: new Date() }]);
  }, []);

  // Vitals update
  useEffect(() => {
    if (screen !== 'simulation') return;
    const iv = setInterval(() => {
      setVitals(generateVitals(currentPhase?.id));
    }, 3000);
    return () => clearInterval(iv);
  }, [screen, currentPhase]);

  // Elapsed timer
  useEffect(() => {
    if (screen !== 'simulation') return;
    timerRef.current = setInterval(() => {
      setElapsedTime(prev => prev + 1);
    }, 1000);
    return () => clearInterval(timerRef.current);
  }, [screen]);

  // Trigger events with delay
  useEffect(() => {
    if (screen !== 'simulation') return;
    if (activeEvent) return; // wait until current event is resolved

    const events = EVENTS_BY_PHASE[PHASES[currentPhaseIdx]?.id] || [];
    if (currentEventIdx < events.length) {
      setWaitingForEvent(true);
      const timeout = setTimeout(() => {
        setActiveEvent(events[currentEventIdx]);
        setEventTimer(0);
        setWaitingForEvent(false);
        addLog(`이벤트 발생: ${events[currentEventIdx].title}`, 'ai');
      }, 3000); // 3 sec delay between events
      return () => clearTimeout(timeout);
    } else {
      // All events in this phase done — advance to next phase
      if (currentPhaseIdx < PHASES.length - 1) {
        const timeout = setTimeout(() => {
          const nextIdx = currentPhaseIdx + 1;
          setCurrentPhaseIdx(nextIdx);
          setCurrentEventIdx(0);
          addLog(`단계 전환: ${PHASES[nextIdx].name}`, 'system');
        }, 2000);
        return () => clearTimeout(timeout);
      } else {
        // All phases done
        setTimeout(() => setScreen('complete'), 2000);
      }
    }
  }, [screen, currentPhaseIdx, currentEventIdx, activeEvent]);

  // Event response timer
  useEffect(() => {
    if (!activeEvent) return;
    eventTimerRef.current = setInterval(() => {
      setEventTimer(prev => prev + 1);
    }, 1000);
    return () => clearInterval(eventTimerRef.current);
  }, [activeEvent]);

  const handleDecision = (action) => {
    const evt = activeEvent;
    const isCorrect = action === evt.correctAction;
    const responseTime = eventTimer;

    setDecisions(prev => [...prev, {
      eventId: evt.id,
      phase: currentPhase.id,
      action,
      correct: isCorrect,
      responseTime,
      aiConfidence: evt.aiConfidence,
    }]);

    addLog(
      `${action === 'approve' ? '✓ AI 행동 승인' : '✗ 의사 개입'} — ${evt.title} (${responseTime}초)`,
      'user'
    );

    if (!isCorrect) {
      addLog(
        action === 'approve'
          ? '⚠ 이 상황에서는 의사 개입이 더 적절했을 수 있습니다'
          : '⚠ AI 판단이 적절했을 수 있는 상황이었습니다',
        'alert'
      );
    }

    setActiveEvent(null);
    setEventTimer(0);
    setCurrentEventIdx(prev => prev + 1);
  };

  // Format time
  const fmt = (s) => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;

  // ---- SCREENS ----

  if (screen === 'landing') {
    return (
      <div className="landing">
        <h1>Context-Aware Surgical AI Monitoring</h1>
        <p className="subtitle">
          복강경 담낭절제술(Laparoscopic Cholecystectomy) 시뮬레이션<br/>
          Level 2 Human–AI Collaboration에서 맥락 인지 기반 정보 제시가<br/>
          Trust Calibration에 미치는 영향 평가
        </p>
        <div className="condition-grid">
          <div className="condition-card" onClick={() => startSimulation('A')}>
            <span className="tag tag-a">Condition A</span>
            <h3>Static Interface</h3>
            <p>고정된 정보 구조. 수술 단계나 AI 상태 변화에 관계없이 동일한 형태의 정보를 제시합니다.</p>
          </div>
          <div className="condition-card" onClick={() => startSimulation('B')}>
            <span className="tag tag-b">Condition B</span>
            <h3>Phase-Adaptive Interface</h3>
            <p>수술 단계(Phase)에 따라 정보 구조가 적응적으로 변화합니다. 현재 단계의 맥락과 위험도 정보를 제공합니다.</p>
          </div>
          <div className="condition-card" onClick={() => startSimulation('C')}>
            <span className="tag tag-c">Condition C</span>
            <h3>Phase + AI-State Adaptive</h3>
            <p>수술 단계와 AI 상태(Confidence, Reasoning)를 모두 반영하여 정보를 적응적으로 제시합니다.</p>
          </div>
        </div>
        <p style={{marginTop: '1.5rem', fontSize: '0.75rem', color: 'var(--text-muted)'}}>
          Phase definitions based on Cholec80 Dataset (Twinanda et al., CAMMA, 2017) · 80 videos, 5 phases, 25fps<br/>
          Kookmin University · Smart Experience Design Lab · 2026
        </p>
      </div>
    );
  }

  if (screen === 'complete') {
    const correct = decisions.filter(d => d.correct).length;
    const total = decisions.length;
    const avgTime = total > 0 ? (decisions.reduce((a,d) => a + d.responseTime, 0) / total).toFixed(1) : 0;
    const interventions = decisions.filter(d => d.action === 'intervene').length;

    return (
      <div className="completion-screen animate-in">
        <div className="completion-card">
          <h2>시뮬레이션 완료</h2>
          <p style={{color: 'var(--text-secondary)', marginBottom: '0.5rem'}}>
            조건 {condition}: {condition === 'A' ? 'Static' : condition === 'B' ? 'Phase-Adaptive' : 'Phase + AI-State Adaptive'}
          </p>
          <div className="completion-stats">
            <div className="completion-stat">
              <div className="num" style={{color: 'var(--accent-teal)'}}>{correct}/{total}</div>
              <div className="label">적절한 의사결정</div>
            </div>
            <div className="completion-stat">
              <div className="num" style={{color: 'var(--accent-blue)'}}>{avgTime}s</div>
              <div className="label">평균 반응 시간</div>
            </div>
            <div className="completion-stat">
              <div className="num" style={{color: 'var(--accent-purple)'}}>{interventions}</div>
              <div className="label">의사 개입 횟수</div>
            </div>
          </div>

          <div style={{textAlign: 'left', marginTop: '1rem'}}>
            <div className="panel-title" style={{marginBottom: '0.6rem'}}>의사결정 기록</div>
            {decisions.map((d, i) => {
              const evt = Object.values(EVENTS_BY_PHASE).flat().find(e => e.id === d.eventId);
              return (
                <div key={i} style={{
                  display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                  padding: '0.5rem 0', borderBottom: '1px solid var(--border)', fontSize: '0.8rem'
                }}>
                  <span style={{color: d.correct ? 'var(--accent-green)' : 'var(--accent-red)'}}>
                    {d.correct ? '✓' : '✗'} {evt?.title?.slice(0, 30)}...
                  </span>
                  <span className="mono" style={{color: 'var(--text-muted)', fontSize: '0.72rem'}}>
                    {d.action === 'approve' ? '승인' : '개입'} · {d.responseTime}s
                  </span>
                </div>
              );
            })}
          </div>

          <div style={{display: 'flex', gap: '0.6rem', marginTop: '1.5rem', justifyContent: 'center'}}>
            <button className="btn btn-approve" onClick={() => { setScreen('landing'); setDecisions([]); setLogs([]); }}>
              다른 조건으로 재시작
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ---- SIMULATION SCREEN ----
  return (
    <div className="sim-container">
      {/* Top Bar */}
      <div className="topbar">
        <div className="topbar-brand">
          <span className="dot"></span>
          Surgical AI Monitor
        </div>
        <div className="topbar-info">
          <span className={`badge ${condition === 'A' ? 'badge-static' : condition === 'B' ? 'badge-phase' : 'badge-full'}`}>
            Condition {condition}: {condition === 'A' ? 'Static' : condition === 'B' ? 'Phase-Adaptive' : 'Full Adaptive'}
          </span>
          <span className="mono">{fmt(elapsedTime)}</span>
          <span style={{cursor: 'pointer', opacity: 0.6}} onClick={() => setScreen('landing')}>✕ 종료</span>
        </div>
      </div>

      {/* Left Panel — Phase & Vitals */}
      <div className="left-panel">
        {/* Phase list: always shown but detail varies by condition */}
        <div className="panel-section">
          <div className="panel-title">수술 단계 (Surgical Phase)</div>
          <div className="phase-list">
            {PHASES.map((p, i) => (
              <div key={p.id} className={`phase-item ${i === currentPhaseIdx ? 'active' : i < currentPhaseIdx ? 'completed' : ''}`}>
                <span className="phase-dot"></span>
                <span style={{fontSize: '0.78rem'}}>{p.name}</span>
              </div>
            ))}
          </div>
        </div>

        {/* Vitals */}
        <div className="panel-section">
          <div className="panel-title">환자 활력징후</div>
          <div className="vital-grid">
            <div className="vital-card">
              <div className="vital-label">HR (bpm)</div>
              <div className={`vital-value ${vitals.hr > 90 ? 'warning' : 'normal'}`}>{vitals.hr}</div>
            </div>
            <div className="vital-card">
              <div className="vital-label">BP (mmHg)</div>
              <div className="vital-value normal">{vitals.bp}</div>
            </div>
            <div className="vital-card">
              <div className="vital-label">SpO₂ (%)</div>
              <div className={`vital-value ${vitals.spo2 < 95 ? 'danger' : 'normal'}`}>{vitals.spo2}</div>
            </div>
            <div className="vital-card">
              <div className="vital-label">CO₂ (mmHg)</div>
              <div className={`vital-value ${vitals.co2 > 15 ? 'warning' : 'normal'}`}>{vitals.co2}</div>
            </div>
          </div>
        </div>

        {/* Phase-adaptive info (B, C only) */}
        {(condition === 'B' || condition === 'C') && (
          <div className="panel-section animate-in">
            <div className="panel-title">현재 단계 정보</div>
            <div className="phase-info-card">
              <div className="phase-info-title">{currentPhase?.nameEn}</div>
              <div style={{fontSize: '0.78rem', color: 'var(--text-secondary)', lineHeight: 1.5, marginBottom: '0.5rem'}}>
                {activeEvent?.phaseContext || `${currentPhase?.name} 진행 중`}
              </div>
              <div className="risk-indicator">
                <span className={`risk-dot risk-${currentPhase?.risk}`}></span>
                <span className="risk-label">
                  위험도: {currentPhase?.risk === 'low' ? 'Low' : currentPhase?.risk === 'medium' ? 'Medium' : 'High'}
                </span>
              </div>
              <div style={{fontSize: '0.7rem', color: 'var(--text-muted)', marginTop: '0.4rem'}}>
                Cholec80 중앙값: {currentPhase?.cholec80Median} · 도구: {currentPhase?.tools?.join(', ')}
              </div>
              <div className="progress-track">
                <div className="progress-fill" style={{width: `${((currentPhaseIdx) / PHASES.length) * 100}%`}}></div>
              </div>
            </div>
          </div>
        )}
      </div>

      {/* Center — Surgical Viewport */}
      <div className="center-panel">
        <div className="surgical-viewport">
          <div className="viewport-label">
            <span className="rec"></span>
            LIVE — Laparoscopic View
          </div>
          <SurgicalView phase={currentPhase?.id} phaseIndex={currentPhaseIdx} />

          {/* Event overlay */}
          {activeEvent && (
            <div className="event-overlay">
              <div className={`event-card ${activeEvent.type === 'alert' ? 'critical' : ''}`}>
                <div className="event-header">
                  <span className={`event-type ${activeEvent.type}`}>
                    {activeEvent.type === 'alert' ? 'ALERT' : activeEvent.type === 'decision' ? 'DECISION' : 'INFO'}
                  </span>
                  <span className="event-timer mono">{fmt(eventTimer)}</span>
                </div>
                <div className="event-title">{activeEvent.title}</div>
                <div className="event-desc">{activeEvent.desc}</div>

                {/* AI confidence — Condition C only */}
                {condition === 'C' && (
                  <div style={{marginBottom: '0.8rem', padding: '0.6rem', background: 'rgba(20,184,166,0.08)', borderRadius: '8px', border: '1px solid rgba(20,184,166,0.15)'}}>
                    <div style={{display: 'flex', justifyContent: 'space-between', fontSize: '0.75rem', marginBottom: '0.3rem'}}>
                      <span style={{color: 'var(--accent-teal)'}}>AI Confidence</span>
                      <span className="mono" style={{color: activeEvent.aiConfidence >= 80 ? 'var(--accent-green)' : activeEvent.aiConfidence >= 65 ? 'var(--accent-amber)' : 'var(--accent-red)', fontWeight: 600}}>
                        {activeEvent.aiConfidence}%
                      </span>
                    </div>
                    <div className="confidence-bar-bg">
                      <div className="confidence-bar-fill" style={{
                        width: `${activeEvent.aiConfidence}%`,
                        background: activeEvent.aiConfidence >= 80 ? 'var(--accent-green)' : activeEvent.aiConfidence >= 65 ? 'var(--accent-amber)' : 'var(--accent-red)'
                      }}></div>
                    </div>
                    <div style={{fontSize: '0.72rem', color: 'var(--text-muted)', marginTop: '0.4rem'}}>
                      {activeEvent.aiReasoning}
                    </div>
                  </div>
                )}

                <div className="event-actions">
                  <button className="btn btn-approve" onClick={() => handleDecision('approve')}>
                    ✓ AI 행동 승인
                  </button>
                  <button className="btn btn-intervene" onClick={() => handleDecision('intervene')}>
                    ✗ 의사 개입
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Waiting indicator */}
          {!activeEvent && waitingForEvent && (
            <div style={{position: 'absolute', bottom: '1rem', left: '50%', transform: 'translateX(-50%)',
              padding: '0.4rem 1rem', background: 'rgba(26,34,51,0.8)', borderRadius: '20px',
              fontSize: '0.75rem', color: 'var(--text-muted)', border: '1px solid var(--border)'}}>
              <span className="animate-pulse">수술 진행 중...</span>
            </div>
          )}
        </div>
      </div>

      {/* Right Panel */}
      <div className="right-panel">
        {/* AI State Card — Condition C only */}
        {condition === 'C' && (
          <div className="ai-status-card animate-in">
            <div className="panel-title" style={{marginBottom: '0.6rem'}}>AI 시스템 상태</div>
            <div className="ai-detail-row">
              <span className="ai-detail-label">현재 모드</span>
              <span className="ai-detail-value">Level 2 — 부분 자율</span>
            </div>
            <div className="ai-detail-row">
              <span className="ai-detail-label">직전 Confidence</span>
              <span className="ai-detail-value mono" style={{
                color: (activeEvent?.aiConfidence || 85) >= 80 ? 'var(--accent-green)' :
                  (activeEvent?.aiConfidence || 85) >= 65 ? 'var(--accent-amber)' : 'var(--accent-red)'
              }}>
                {activeEvent?.aiConfidence || '—'}%
              </span>
            </div>
            <div className="ai-detail-row">
              <span className="ai-detail-label">처리 태스크</span>
              <span className="ai-detail-value">{currentPhase?.nameEn}</span>
            </div>
            <div className="ai-detail-row">
              <span className="ai-detail-label">상태</span>
              <span className="ai-detail-value" style={{color: activeEvent ? 'var(--accent-amber)' : 'var(--accent-green)'}}>
                {activeEvent ? '의사 확인 대기' : '자율 수행 중'}
              </span>
            </div>
          </div>
        )}

        {/* Decision Summary */}
        <div className="decision-summary">
          <div className="panel-title" style={{marginBottom: '0.6rem'}}>의사결정 요약</div>
          <div className="stat-row">
            <span className="stat-label">총 이벤트</span>
            <span className="stat-value">{decisions.length} / 6</span>
          </div>
          <div className="stat-row">
            <span className="stat-label">적절한 판단</span>
            <span className="stat-value" style={{color: 'var(--accent-green)'}}>
              {decisions.filter(d => d.correct).length}
            </span>
          </div>
          <div className="stat-row">
            <span className="stat-label">의사 개입</span>
            <span className="stat-value" style={{color: 'var(--accent-purple)'}}>
              {decisions.filter(d => d.action === 'intervene').length}
            </span>
          </div>
          <div className="stat-row">
            <span className="stat-label">평균 반응시간</span>
            <span className="stat-value mono">
              {decisions.length > 0 ? (decisions.reduce((a,d) => a + d.responseTime, 0) / decisions.length).toFixed(1) + 's' : '—'}
            </span>
          </div>
        </div>

        {/* Activity Log */}
        <div style={{flex: 1, overflow: 'hidden', display: 'flex', flexDirection: 'column'}}>
          <div className="panel-title" style={{marginBottom: '0.6rem'}}>활동 로그</div>
          <div style={{flex: 1, overflowY: 'auto'}}>
            {logs.slice().reverse().map((log, i) => (
              <div key={i} className="log-entry">
                <span className="log-time">{log.time.toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit', second:'2-digit'})}</span>
                <span className={`log-text ${log.type === 'user' ? 'user-action' : log.type === 'ai' ? 'ai-action' : log.type === 'alert' ? 'alert-action' : ''}`}>
                  {log.text}
                </span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
